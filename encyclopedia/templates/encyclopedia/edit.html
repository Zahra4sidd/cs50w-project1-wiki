{% extends "encyclopedia/layout.html" %}

{% block title %}
    Edit Page
{% endblock %}

{% block body %}
    <h1>Edit Page: {{ title }}</h1>
    <form action="{% url 'edit_page' title %}" method="POST">
    {% csrf_token %}
    <div>
        <label>Title: </label>
        <input type="text" name="title" value="{{title}}">
    </div>
    <div>
        <br>
        <label>Markdown Content:</label>
        <br>
        <textarea name="content" style="height: 300px; width: 700px;">{{content}}</textarea>
    </div>
    <br>
    <input type="submit" value="Save Changes" class="btn btn-primary">
    </form>
{% endblock %}
