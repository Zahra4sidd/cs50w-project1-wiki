{% extends "encyclopedia/layout.html" %}

{% block title %}
    Create New Page
{% endblock %}

{% block body %}
    <h1>New Page</h1>
    <form action="{% url 'new_page' %}" method="POST">
    {% csrf_token %}
    <div>
        <label>Title: </label>
        <input type="text" name="title" placeholder="Enter a title">
    </div>
    <div>
        <br>
        <label>Markdown Content:</label>
        <br>
        <textarea name="content" style="height: 300px; width: 700px;" placeholder="Write your markdown content here..."></textarea>
    </div>
    <br>
    <input type="submit" value="Save Page" class="btn btn-primary">
    
    </form>
{% endblock %}
